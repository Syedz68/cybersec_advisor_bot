version: "3.9"
services:
  api:
    build: ./backend
    container_name: cybersec_api
    env_file:
      - ./backend/.env
    ports:
      - "4555:8000"
    depends_on:
      - qdrant
      - ollama
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  frontend:
    build: ./frontend
    container_name: cybersec_frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:4555
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  qdrant_storage:
  ollama_data:
